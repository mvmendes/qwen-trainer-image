name: build-vast-image

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.vast'
      - '.github/workflows/build-vast-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Vast.ai + Qwen pre-cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.vast
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alienx-train:3.0-vast
