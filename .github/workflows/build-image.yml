name: build-image

# Builda as imagens de treino (Unsloth) via Dockerfile.multi para GPUs
# legacy (RTX 3090/4090/L4) e blackwell (RTX 5090).
# Publica no GitHub Container Registry (ghcr.io).

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch: {}

jobs:
  build-legacy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (legacy — RTX 3090/4090/L4)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.multi
          push: true
          build-args: |
            GPU_ARCH=legacy
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwen-trainer-image:1.0
            ghcr.io/${{ github.repository_owner }}/qwen-trainer-image:torch2.6-unsloth

  build-blackwell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (blackwell — RTX 5090)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.multi
          push: true
          build-args: |
            GPU_ARCH=blackwell
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwen-trainer-image:2.0-blackwell
