name: build-image

# Builda a imagem de treino (Unsloth + torch 2.6) nos runners do GitHub e
# publica no GitHub Container Registry (ghcr.io). Sem upload pesado da sua maquina.

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Imagem CUDA e grande (~12-15GB) -> liberar disco no runner antes do build
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwen-trainer-image:latest
            ghcr.io/${{ github.repository_owner }}/qwen-trainer-image:torch2.6-unsloth
